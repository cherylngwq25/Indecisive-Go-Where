<!DOCTYPE html> 
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Food Choices in Singapore</title>
    <link rel="stylesheet" href="style.css" />
      
  <script>
    var esriConfig = {
      apiKey: "GIS_KEY"};
  </script>
      
  <script type="module" src="https://js.arcgis.com/5.0/"></script>

  </head>

  <body>
  <!----INTERFACE---->
  <div class="container">
    <!----SIDEPANEL<!--BASE-->
    <div class="sidebar">
      <h1>Indecisive-Go-Where</h1>
      <p>Lets <b>randomly explore</b> where to eat next ~ <br> It would be a <b>SURPRISE🎁!</b></p>
      
      <!--GIF-->
      <img class="pic" src="https://media.tenor.com/l2uIV3I5S40AAAAM/choices-sesamo.gif" alt="Decision Fatigue">
      
      <!--FILTERCATEGORIES-->
      <div class= "section">
        <label><u>Select Food Category:</u></label>
        <div class="options">
          <label><input type="checkbox" value="Cafes" checked> Cafes</label>
          <label><input type="checkbox" value="Restaurants" checked> Restaurants</label>
          <label><input type="checkbox" value="FoodCentres" checked> Food Centres</label>
        </div>
      </div>
      
      <!--FILTERLOCATION-->
      <div class= "section">
        <label for="filtertype"><u>Select Location:</u></label>
        <select id="filtertype">
            <option value="planningArea">Planning Area</option>
            <option value="mrtStation">MRT Station</option>
        </select>
      </div>
      <div class= "section">
        <label for="filterv">Filter Value:</label>
        <select id="filterv"></select>
      </div>
      
      <!--GEN.RE.BUTTON-->
      <div class= "section">
        <button id="generatebtn">Generate Random Food Location</button>
        <button id="resetbtn" class="b2">Reset</button>
      </div>
      
      <!--RESULTCARD-->
      <div id="resultcard" class="result-card">
        <div class="result-title">No results</div>
        <div class="result-line">Select filters and click the button.</div>
      </div><br>
      
      <!--C.BUTTON-->
      <button id="contribtn" class="b3">Be a Location Contributor!</button>

    </div>
    
    <!----MAPPANEL---->
    <arcgis-map basemap="arcgis/light-gray" center="103.8198, 1.3521" zoom="10">
    <arcgis-compass slot="top-left"></arcgis-compass>
    <arcgis-zoom slot="top-left"></arcgis-zoom>
    <arcgis-home slot="top-left"></arcgis-home>
    <arcgis-scale-bar slot="bottom-left" unit="metric"></arcgis-scale-bar>
    <arcgis-search slot="top-right"></arcgis-search>
    
    
    </arcgis-map>
    
  </div>

  <!----ARCGISJAVA---->
  <script type="module">
    const [Map, FeatureLayer,LayerList, PopupTemplate, Editor, Graphic] = await $arcgis.import([
        "@arcgis/core/Map.js",
        "@arcgis/core/layers/FeatureLayer.js",
        "@arcgis/core/widgets/LayerList.js",
        "@arcgis/core/PopupTemplate.js",
        "@arcgis/core/widgets/Editor.js",
        "@arcgis/core/Graphic.js"
      ]);

    const viewElement = document.querySelector("arcgis-map");
    await viewElement.viewOnReady();
    const refLayers = viewElement.map.basemap.referenceLayers;
    const initialView = {
      center: [103.8198, 1.3521],
      zoom: 10
    };

    //RefAppearonly@ZoomExtent//
    refLayers.forEach(layer => {
    layer.minScale = 50000;
    layer.maxScale = 0;
    });
    

  ////////////BASE MAP LAYERS////////////
  ////Cafe Feature Layer(Points)////
    //EnableFields&PopUp//
    const CafeLayer = new FeatureLayer({
      url: "https://services5.arcgis.com/KiRa9d9aHfdXiCqt/arcgis/rest/services/Cafes_/FeatureServer/0",
      outFields: ["*"],
      title: "Cafes",
      popupEnabled: true,
      popupTemplate: {
      title: "{NAME}",
      content: [
        {type: "fields",
        fieldInfos: [
          { fieldName: "CUISINE", label: "Cuisine" },
          { fieldName: "PLN_AREA_N", label: "Planning Area" }
           ]
        },
        
        {type: "text",
         text: "<u>Nearest Station:</u><br/><b>{Stn_Name_C} ({Station})</b><br/>{TrainLine}, <b>{expression/dist}</b> m away "
         }
        ],
        
        expressionInfos: [{
          name: "dist",
          expression: "Round($feature.NEAR_DIST, 2)"
         }]}
    });
    //AddtoMap//
    viewElement.map.add(CafeLayer);
      
  ////Restaurant Feature Layer (points)////
    //EnableFields&PopUp//
    const RestaLayer = new FeatureLayer({
      url: "https://services5.arcgis.com/KiRa9d9aHfdXiCqt/arcgis/rest/services/Restaurants_/FeatureServer/0",
      outFields: ["*"],
      title: "Restaurants",
      popupEnabled: true,
      popupTemplate: {
      title: "{NAME}",
      content: [
        {type: "fields",
        fieldInfos: [
          { fieldName: "CUISINE", label: "Cuisine" },
          { fieldName: "PLN_AREA_N", label: "Planning Area" }
           ]
        },
        
        {type: "text",
         text: "<u>Nearest Station:</u><br/><b>{Stn_Name_C} ({Station})</b><br/>{TrainLine}, <b>{expression/dist}</b> m away "
         }
        ],
        
        expressionInfos: [{
          name: "dist",
          expression: "Round($feature.NEAR_DIST, 2)"
         }]}
    });
    //AddtoMap//
    viewElement.map.add(RestaLayer,0);
      
  ////FoodC Feature Layer (points)////
    //EnableFields&PopUp//
    const FCLayer = new FeatureLayer({
      url: "https://services5.arcgis.com/KiRa9d9aHfdXiCqt/arcgis/rest/services/FoodCentres_/FeatureServer/0",
      outFields: ["*"],
      title: "FoodCentres",
      popupEnabled: true,
      popupTemplate: {
      title: "{NAME}",
      content: [
        {type: "fields",
        fieldInfos: [
          { fieldName: "CUISINE", label: "Cuisine" },
          { fieldName: "PLN_AREA_N", label: "Planning Area" }
           ]
        },
        
        {type: "text",
         text: "<u>Nearest Station:</u><br/><b>{Stn_Name_C} ({Station})</b><br/>{TrainLine}, <b>{expression/dist}</b> m away "
         }
        ],
        
        expressionInfos: [{
          name: "dist",
          expression: "Round($feature.NEAR_DIST, 2)"
         }]}
    });
    //AddtoMap//
    viewElement.map.add(FCLayer,0);
      
  ////PublicT Feature Layer (points)////
    //LabelAttributes//
    const PTLabels = {
      symbol: {
        type: "text",
        color: "#FFFFFF",
        haloColor: "#5c625e",
        haloSize: "2px",
        font: {
          size: "8px",
          family: "Avenir Next LT Pro",
          style: "italic",
          weight: "bold",
        },
        yoffset:"2px"
      },

      labelPlacement: "below-center",
      labelExpressionInfo: {
        expression: "Replace($feature.Stn_Name_C, ' STATION', '')"
      },
      
      //LabelsAppearonly@ZoomExtent//
       minScale: 125000,
       maxScale: 0
       };    
    //EnableFields&Labels//
    const PTLayer = new FeatureLayer({
      url: "https://services5.arcgis.com/KiRa9d9aHfdXiCqt/arcgis/rest/services/Public_Transport_Nodes/FeatureServer/0",
      outFields: ["*"],
      labelingInfo: [PTLabels],
    });
    //AddtoMap//
    viewElement.map.add(PTLayer,0);
      
  ////Planning Areas Feature Layer (polygons)////
    const PALayer = new FeatureLayer({
      url: "https://services5.arcgis.com/KiRa9d9aHfdXiCqt/arcgis/rest/services/Planning_Areas/FeatureServer/0",
    });
    //AddtoMap//
    viewElement.map.add(PALayer,0);
    

  ////////////DATA CONFIG ELEMENTS////////////
  //Planningareafield///
  const PA_FIELD = "PLN_AREA_N";
  //Transportstnfield//
  const MRT_FIELD = "Stn_Name_C";
  //15-min-radiusaroundstation//
  const MRT_SEARCH_RADIUS_METERS = 800;
    
  ////////////UI ELEMENTS////////////
  const filtertypeEl = document.getElementById("filtertype");
  const filtervalueEl = document.getElementById("filterv");
  const generatebtn = document.getElementById("generatebtn");
  const resetbtn = document.getElementById("resetbtn");
  const resultcard = document.getElementById("resultcard");
  const contribtn = document.getElementById("contribtn");
    
  ////////////WIDGETS/////////////
  //////LAYERLISTVISIBILITY//////
  //Padding//
    viewElement.view.padding = { right: 5, bottom: 5 };
  //AddLegendtoList//
  const layerList = new LayerList({
    view: viewElement.view,
    listItemCreatedFunction: (event) => {
      event.item.panel = {
       content: "legend",
       open: false
      };
     }
    });
  //Add&Position//
  viewElement.view.ui.add(layerList, "bottom-right");
    
  //////EDITOR//////
  const editor = new Editor({
    view: viewElement.view,
    layerInfos: [
      {
        layer: CafeLayer
      },
      {
        layer: RestaLayer
      },
      {
        layer: FCLayer
      }
    ]
  });
  //Add&Position//
  let editorVisible = false;
  //ShowonMap//
  function showEditor() {
    if (!editorVisible) {
      viewElement.view.ui.add(editor, "top-right");
      editorVisible = true;
    }
  }
  //HideonMap//
  function hideEditor() {
    if (editorVisible) {
      viewElement.view.ui.remove(editor);
      editorVisible = false;
    }
  }
    
  ////////////FUNCTIONS/////////////
  //////UI//////
  //Updatesresultcard//
  function setResult(cat, lines = []) {
        resultcard.innerHTML = `
          <div class="result-title">${cat}</div>
          ${lines.map(line => `<div class="result-line">${line}</div>`).join("")}
        `;
      }
  //Picksarandomlocation//
  function randomPick(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }
  
  //////DROPDOWN//////
  //Resets//
  function clearSelectOptions(selectEl) {
        selectEl.innerHTML = "";
      }
  //Dynamicfills//
  function populateSelect(selectEl, values) {
        clearSelectOptions(selectEl);
        if (!values.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "No available values";
          selectEl.appendChild(option);
          return;
        }
          
        values.forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        selectEl.appendChild(option);
        });
      }
  
  //////LAYERSELECTION//////
  //Readscheckboxes//
  function getSelectedLayers() {
        const checkedValues = [...document.querySelectorAll('input[type="checkbox"]:checked')]
         .map(cb => cb.value);

       const layers = [];
       if (checkedValues.includes("Cafes")) layers.push(CafeLayer);
       if (checkedValues.includes("Restaurants")) layers.push(RestaLayer);
       if (checkedValues.includes("FoodCentres")) layers.push(FCLayer);

       return layers;
      }

  //////MAPZOOM+REDMARKER//////
  function zoomToFeature(feature) {
      viewElement.view.graphics.removeAll();

      const graphic = new Graphic({
          geometry: feature.geometry,
          symbol: {
            type: "simple-marker",
            color: [255, 99, 71, 0.95],
            size: 14,
            outline: {
              color: [255, 255, 255],
              width: 2
            }
          }
        });

      viewElement.view.graphics.add(graphic);

      viewElement.view.goTo({
          target: feature.geometry,
          zoom: 16
        });
    }
  
  //////FETCHDATAFROMLAYERS//////
  //Query&Extract//
  async function getAllPlanningAreas() {
        const layers = getSelectedLayers();
        const values = new Set();

        for (const layer of layers) {
          const query = layer.createQuery();
          query.where = "1=1";
          query.returnGeometry = false;
          query.outFields = [PA_FIELD];

          const result = await layer.queryFeatures(query);

          result.features.forEach(f => {
            const val = f.attributes[PA_FIELD];
            if (val !== null && val !== undefined && val !== "") {
              values.add(val);
            }
          });
        }

        return [...values].sort((a, b) => String(a).localeCompare(String(b)));
      }
  async function getAllMRTStations() {
        const query = PTLayer.createQuery();
        query.where = "1=1";
        query.returnGeometry = false;
        query.outFields = [MRT_FIELD];

        const result = await PTLayer.queryFeatures(query);
        const values = new Set();

        result.features.forEach(f => {
          const val = f.attributes[MRT_FIELD];
          if (val) values.add(val);
        });

        return [...values].sort((a, b) => String(a).localeCompare(String(b)));
      }
  
  //////FILTERSWITCH//////
  async function updateFilterValues() {
        const mode = filtertypeEl.value;

        try {
          if (mode === "planningArea") {
            const planningAreas = await getAllPlanningAreas();
            populateSelect(filtervalueEl, planningAreas);
          } else {
            const stations = await getAllMRTStations();
            populateSelect(filtervalueEl, stations);
          }
        } catch (err) {
          console.error(err);
          setResult("Error", ["Could not load dropdown values."]);
        }
      }
  
  //////QUERYLOGIC//////
  async function queryFoodByPlanningArea(planningArea) {
        const layers = getSelectedLayers();
        const allMatches = [];

        for (const layer of layers) {
          const query = layer.createQuery();
          query.where = `${PA_FIELD} = '${planningArea.replace(/'/g, "''")}'`;
          query.returnGeometry = true;
          query.outFields = ["*"];

          const result = await layer.queryFeatures(query);

          result.features.forEach(f => {
            f._category = layer.title;
            allMatches.push(f);
          });
        }

        return allMatches;
      }
  async function queryFoodNearMRT(stationName) {
        const stationQuery = PTLayer.createQuery();
        stationQuery.where = `${MRT_FIELD} = '${stationName.replace(/'/g, "''")}'`;
        stationQuery.returnGeometry = true;
        stationQuery.outFields = [MRT_FIELD];

        const stationResult = await PTLayer.queryFeatures(stationQuery);

        if (!stationResult.features.length) return [];

        const stationFeature = stationResult.features[0];
        const stationGeometry = stationFeature.geometry;

        const layers = getSelectedLayers();
        const allMatches = [];

        for (const layer of layers) {
          const query = layer.createQuery();
          query.geometry = stationGeometry;
          query.distance = MRT_SEARCH_RADIUS_METERS;
          query.units = "meters";
          query.spatialRelationship = "intersects";
          query.returnGeometry = true;
          query.outFields = ["*"];
          query.where = "1=1";

          const result = await layer.queryFeatures(query);

          result.features.forEach(f => {
          f._category = layer.title;
          f._mrtName = stationName;
          allMatches.push(f);
          });
        }

        return allMatches;
      }
  
  //////RANDOMISERLOGIC//////
  async function generateRandomFood() {
        const mode = filtertypeEl.value;
        const selectedValue = filtervalueEl.value;

        if (!selectedValue) {
          setResult("No selection", ["Please choose a value first."]);
          return;
        }

        try {
          let candidates = [];

          if (mode === "planningArea") {
            candidates = await queryFoodByPlanningArea(selectedValue);
          } else {
            candidates = await queryFoodNearMRT(selectedValue);
          }

          if (!candidates.length) {
            setResult("No matching food place", [
              `No food locations found for <b>${selectedValue}</b>.`
            ]);
            viewElement.view.graphics.removeAll();
            viewElement.view.popup.close();
            return;
          }

          const chosen = randomPick(candidates);
          const name =
            chosen.attributes.name ||
            chosen.attributes.Name ||
            chosen.attributes.NAME ||
            "Unnamed Food Place";

          setResult(name, [
            `<b>Category:</b> ${chosen._category || "Food"}`,
            `<b>Planning Area:</b> ${chosen.attributes[PA_FIELD] ?? "-"}`,
            `<b>Nearest MRT:</b> ${chosen.attributes[MRT_FIELD] ?? chosen._mrtName ?? "-"}`,
            `<b>Selected By:</b> ${mode === "planningArea" ? "Planning Area" : "MRT Station"}`
          ]);

          zoomToFeature(chosen);
        } catch (err) {
          console.error(err);
          setResult("Error", ["Something went wrong while generating a food place."]);
        }
      }
  
  //////RESETLOGIC//////
  //Refreshes the entire page//
  function resetApp() {
      location.reload();
      }

  ////////////EVENTLISTENERS////////////
  //Findallcheckboxes&store//
  const categoryCheckboxes = document.querySelectorAll(".food-cat");
  //Updateoptions//
  filtertypeEl.addEventListener("change", updateFilterValues);
  //genbtn//
  generatebtn.addEventListener("click", generateRandomFood);
  //rebtn//
  resetbtn.addEventListener("click", resetApp);
  //dropdownupdatesbasedonuser//
  categoryCheckboxes.forEach(cb => {
      cb.addEventListener("change", updateFilterValues);
      });
  //showorhideeditor//
  contribtn.addEventListener("click", () => {
        if (editorVisible) {
          hideEditor();
          contribtn.textContent = "Be a Contributor!";
        } else {
          showEditor();
          contribtn.textContent = "Close Contributor Panel";
        }
      });

  ////////////AUTOINITIALLOADING////////////
  await updateFilterValues();
    
  </script>
      
  </body>
</html>
