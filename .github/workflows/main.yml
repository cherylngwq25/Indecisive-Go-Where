name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Replace GIS key in HTML files
        env:
          GIS_KEY: ${{ secrets.GIS_KEY }}
        run: |
          python <<'PY'
          import os
          from pathlib import Path

          key = os.environ["GIS_KEY"]
          replaced = 0

          for path in Path(".").rglob("*.html"):
              text = path.read_text(encoding="utf-8")
              if "__GIS_KEY__" in text:
                  text = text.replace("__GIS_KEY__", key)
                  path.write_text(text, encoding="utf-8")
                  replaced += 1

          print(f"Replaced placeholder in {replaced} HTML file(s).")
          PY

      - name: Verify replacement happened
        run: |
          if grep -R "__GIS_KEY__" . 2>/dev/null; then
            echo "Placeholder still found."
            exit 1
          else
            echo "Replacement worked."
          fi

      - name: Disable Jekyll
        run: touch .nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
